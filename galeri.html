<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Lengkap | CV Solusi Bumi Lestari</title>
    <meta name="description" content="Kumpulan dokumentasi proyek CV Solusi Bumi Lestari - Ahli lingkungan dan sipil terpercaya.">
    
    <!-- Open Graph -->
    <meta property="og:title" content="Galeri Proyek | CV Solusi Bumi Lestari">
    <meta property="og:description" content="Lihat portofolio pengerjaan proyek kami di seluruh wilayah.">
    <meta property="og:image" content="assets/img/gallery (1).webp">
    
    <link rel="icon" type="image/x-icon" href="assets/img/navbar-logo1.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/index.css">
    <style>
        .gallery-page-header {
            padding-top: 140px;
            padding-bottom: 40px;
            background: var(--light);
            text-align: center;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar shrink">
        <div class="container">
            <a href="index.html" class="logo">
                <img src="assets/img/1_CV SOLUSI BUMI LESTARI.png" alt="Solusi Bumi Lestari Logo">
            </a>
            <ul class="nav-links">
                <li><a href="index.html#home">Beranda</a></li>
                <li><a href="index.html#services">Layanan</a></li>
                <li><a href="index.html#gallery">Galeri</a></li>
                <li><a href="index.html#contact">Kontak</a></li>
            </ul>
        </div>
    </nav>

    <header class="gallery-page-header">
        <div class="container">
            <a href="index.html#gallery" class="back-btn"><i class="fas fa-arrow-left"></i> Kembali</a>
            <h1>Semua Dokumentasi Proyek</h1>
            <p>Kumpulan foto pengerjaan proyek dari seluruh wilayah operasional kami.</p>
        </div>
    </header>

    <section class="section">
        <div class="container">
            <div class="gallery-grid" id="full-gallery">
                <!-- Gallery items will be added here via JS -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">
                    <img src="assets/img/1_CV SOLUSI BUMI LESTARI.png" alt="Logo">
                </div>
                <p>&copy; 2025 CV Solusi Bumi Lestari. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- Floating WA -->
    <a href="https://wa.me/6282242785778?text=Halo,%20saya%20ingin%20Konsultasi%20Gratis" class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i> <span>Konsultasi Gratis</span>
    </a>

    <!-- Custom Lightbox Modal -->
    <div id="lightbox-modal" class="modal">
        <span class="close-modal">&times;</span>
        <span class="prev-modal">&#10094;</span>
        <span class="next-modal">&#10095;</span>
        <img class="modal-content" id="modal-img">
        <div id="modal-caption"></div>
    </div>

    <script src="js/index.js"></script>
    <script>
        const galleryContainer = document.getElementById('full-gallery');
        
        // Daftar file gambar yang ada (Sinkronisasi Terakhir)
        const galleryImages = [
            'gallery (1).webp', 'gallery (7).webp', 'gallery (8).webp', 
            'gallery (10).webp', 'gallery(14).webp', 'gallery(15).webp', 'gallery(16).webp', 
            'gallery(19).webp', 'gallery(21).webp', 'gallery(22).webp', 
            'gallery(26).webp', 'gallery(27).webp', 'gallery(28).webp', 
            'gallery(33).webp', 'gallery(34).webp', 
            'gallery(35).webp', 'gallery(36).webp', 'gallery(37).webp', 
            'gallery(38).webp', 'gallery(39).webp'
        ];

        // Render existing images
        galleryImages.forEach((fileName, index) => {
            const item = document.createElement('a');
            item.href = `assets/img/${fileName}`;
            item.className = 'gallery-item';
            
            item.innerHTML = `
                <img src="assets/img/${fileName}" alt="Proyek ${index + 1}" loading="lazy">
                <div class="gallery-overlay"><span>Klik untuk perbesar</span></div>
            `;
            
            galleryContainer.appendChild(item);
        });
    </script>
</body>
</html>
